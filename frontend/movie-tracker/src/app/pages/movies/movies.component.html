<div class="min-h-screen bg-gray-50">
  <div class="mx-auto max-w-4xl p-6">
    <div class="flex items-center justify-between">
      <h1 class="text-2xl font-bold">Movies</h1>

      <div class="flex items-center gap-3">
        <a class="underline" routerLink="/login" *ngIf="!auth.isLoggedIn()">Login</a>
        <a class="underline" routerLink="/register" *ngIf="!auth.isLoggedIn()">Register</a>
        <button class="rounded-lg border px-3 py-2" *ngIf="auth.isLoggedIn()" (click)="logout()">
          Logout
        </button>
      </div>
    </div>

    <div class="mt-6 rounded-2xl bg-white p-4 shadow">
      <h2 class="text-lg font-semibold">Add movie</h2>

      <div class="mt-3 grid gap-3 md:grid-cols-3">
        <input class="rounded-lg border p-3" placeholder="Title" [(ngModel)]="title" />
        <input class="rounded-lg border p-3" placeholder="Year" type="number" [(ngModel)]="year" />
        <input class="rounded-lg border p-3" placeholder="Genres (comma separated)" [(ngModel)]="genresText" />
      </div>

      <button class="mt-3 rounded-lg bg-black px-4 py-2 text-white" (click)="create()" [disabled]="!title">
        Create
      </button>

      <p *ngIf="error" class="mt-3 text-sm text-red-600">{{ error }}</p>
    </div>

    <div class="mt-6">
      <p *ngIf="loading">Loading...</p>

      <div class="grid gap-3">
        <div *ngFor="let m of movies" class="rounded-2xl bg-white p-4 shadow">
          <div class="flex items-start justify-between">
            <div>
              <div class="text-lg font-semibold">{{ m.title }}</div>
              <div class="text-sm text-gray-600" *ngIf="m.year">{{ m.year }}</div>
              <div class="mt-2 flex flex-wrap gap-2">
                <span *ngFor="let g of (m.genres || [])" class="rounded-full bg-gray-100 px-3 py-1 text-xs">
                  {{ g }}
                </span>
              </div>
            </div>
          </div>
        </div>

        <p *ngIf="!loading && movies.length === 0" class="text-gray-600">No movies yet.</p>
      </div>
    </div>
  </div>
</div>
