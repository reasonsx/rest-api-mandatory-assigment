<div class="min-h-screen flex items-center justify-center bg-gray-50 p-4">
  <div class="w-full max-w-md rounded-2xl bg-white p-6 shadow">
    <h1 class="text-2xl font-semibold">Login</h1>

    <div class="mt-4 space-y-3">
      <input class="w-full rounded-lg border p-3" placeholder="Email" [(ngModel)]="email" />
      <input class="w-full rounded-lg border p-3" placeholder="Password" type="password" [(ngModel)]="password" />

      <button class="w-full rounded-lg bg-black p-3 text-white" (click)="submit()">
        Sign in
      </button>

      <p *ngIf="error" class="text-sm text-red-600">{{ error }}</p>

      <a class="text-sm underline" routerLink="/register">Create account</a>
    </div>
  </div>
</div>
