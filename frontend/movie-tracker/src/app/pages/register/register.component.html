<div class="min-h-screen flex items-center justify-center bg-gray-50 p-4">
  <div class="w-full max-w-md rounded-2xl bg-white p-6 shadow">
    <h1 class="text-2xl font-semibold">Register</h1>

    <div class="mt-4 space-y-3">
      <input class="w-full rounded-lg border p-3" placeholder="Email" [(ngModel)]="email" />
      <input class="w-full rounded-lg border p-3" placeholder="Username (optional)" [(ngModel)]="username" />
      <input class="w-full rounded-lg border p-3" placeholder="Password (min 8)" type="password" [(ngModel)]="password" />

      <button class="w-full rounded-lg bg-black p-3 text-white" (click)="submit()">
        Create account
      </button>

      <p *ngIf="error" class="text-sm text-red-600">{{ error }}</p>
      <p *ngIf="ok" class="text-sm text-green-700">{{ ok }}</p>

      <a class="text-sm underline" routerLink="/login">Back to login</a>
    </div>
  </div>
</div>
