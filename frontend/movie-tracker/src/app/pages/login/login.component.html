<div class="min-h-screen flex items-center justify-center bg-gray-50 p-4">
  <div class="w-full max-w-md">
    <div class="rounded-2xl bg-white p-6 shadow">
      <h2 class="text-2xl font-semibold">Login</h2>
      <p class="mt-1 text-sm text-gray-600">Sign in to continue.</p>

      <form class="mt-6 grid gap-4" [formGroup]="form" (ngSubmit)="submit()">
        <div class="grid gap-2">
          <label for="email" class="text-sm font-medium">Email</label>
          <input id="email" pInputText class="w-full" formControlName="email" autocomplete="email" />

          @if (form.controls.email.touched && form.controls.email.invalid) {
            <small class="text-red-600">Enter a valid email.</small>
          }
        </div>

        <div class="grid gap-2">
          <label for="password" class="text-sm font-medium">Password</label>
          <p-password
            inputId="password"
            formControlName="password"
            [toggleMask]="true"
            [feedback]="false"
            styleClass="w-full"
            inputStyleClass="w-full"
          ></p-password>

          @if (form.controls.password.touched && form.controls.password.invalid) {
            <small class="text-red-600">Password must be at least 8 characters.</small>
          }
        </div>

        @if (error()) {
          <div class="rounded-lg border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-700">
            {{ error() }}
          </div>
        }

        <div class="grid gap-2">
          <p-button
            type="submit"
            label="Sign in"
            icon="pi pi-sign-in"
            [loading]="loading()"
            [disabled]="form.invalid || loading()"
            styleClass="w-full"
          ></p-button>

          <p-button
            label="Create account"
            icon="pi pi-user-plus"
            [text]="true"
            routerLink="/register"
            styleClass="w-full"
          ></p-button>
        </div>

        <div class="text-center">
          <a class="text-sm underline text-gray-600 hover:text-black" routerLink="/movies">
            Browse movies
          </a>
        </div>
      </form>
    </div>
  </div>
</div>
